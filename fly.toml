# Fly.io config for Cashflow COD admin app (Shopify Remix + Prisma).
# Generated for `fly deploy`. Update `app` + `primary_region` after `fly launch`.

app = "cashflow-cod"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

  [http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 200

  [[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
