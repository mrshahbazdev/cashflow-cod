# Shopify app configuration
# https://shopify.dev/docs/apps/tools/cli/configuration
#
# Replace client_id with the value from your Shopify Partner dashboard after
# running `shopify app config link`.

name = "cashflow-cod"
handle = "cashflow-cod"
client_id = "94f0f32b340b3d321b3a6756bdcab9fb"
application_url = "https://cashflow-cod-production-2aff.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_customers,write_draft_orders,read_themes"

[auth]
redirect_urls = [
  "https://cashflow-cod-production-2aff.up.railway.app/auth/callback",
  "https://cashflow-cod-production-2aff.up.railway.app/auth/shopify/callback",
  "https://cashflow-cod-production-2aff.up.railway.app/api/auth/callback",
]

[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
topics = ["shop/update"]
uri = "/webhooks/shop/update"

[webhooks.privacy_compliance]
customer_data_request_url = "https://cashflow-cod-production-2aff.up.railway.app/webhooks/gdpr"
customer_deletion_url = "https://cashflow-cod-production-2aff.up.railway.app/webhooks/gdpr"
shop_deletion_url = "https://cashflow-cod-production-2aff.up.railway.app/webhooks/gdpr"

[pos]
embedded = false

